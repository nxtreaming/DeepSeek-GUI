name: Daily Dev Prerelease

on:
  workflow_dispatch:
  schedule:
    # GitHub cron 使用 UTC,对应 Asia/Shanghai 的 12:00 和次日 00:00。
    - cron: '0 4,16 * * *'

permissions:
  contents: write

concurrency:
  group: daily-dev-prerelease
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  RELEASE_CHANNEL: frontier

jobs:
  prepare:
    name: Prepare dev version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      dev_version: ${{ steps.version.outputs.dev_version }}
      head_sha: ${{ steps.version.outputs.head_sha }}
      release_name: ${{ steps.version.outputs.release_name }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out develop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: Compute dev version
        id: version
        env:
          TZ: Asia/Shanghai
        run: |
          set -euo pipefail
          dev_version="$(date +'%Y%m%d.%H%M')"
          app_version="0.0.0-dev-${dev_version//./-}"
          tag="dev-${dev_version}"
          release_name="Kun Dev ${dev_version}"
          head_sha="$(git rev-parse HEAD)"

          {
            echo "app_version=${app_version}"
            echo "dev_version=${dev_version}"
            echo "head_sha=${head_sha}"
            echo "release_name=${release_name}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

          echo "Dev version: ${dev_version}"
          echo "App version: ${app_version}"
          echo "Commit: ${head_sha}"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 90
    needs: prepare
    env:
      KUN_APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      KUN_ARTIFACT_VERSION: ${{ needs.prepare.outputs.dev_version }}
      KUN_UPDATE_CHANNEL: frontier
      DEEPSEEK_GUI_APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      DEEPSEEK_GUI_ARTIFACT_VERSION: ${{ needs.prepare.outputs.dev_version }}
      DEEPSEEK_GUI_UPDATE_CHANNEL: frontier
      RELEASE_CHANNEL: frontier
    steps:
      - name: Check out develop commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install host-native FFmpeg
        run: |
          brew install ffmpeg-full
          ffmpeg_bin="$(brew --prefix ffmpeg-full)/bin"
          "$ffmpeg_bin/ffmpeg" -hide_banner -filters 2>&1 | grep -Eq '[[:space:]]drawtext[[:space:]]'
          echo "$ffmpeg_bin" >> "$GITHUB_PATH"
          echo "KUN_FFMPEG_PATH=$ffmpeg_bin/ffmpeg" >> "$GITHUB_ENV"
          echo "KUN_FFPROBE_PATH=$ffmpeg_bin/ffprobe" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Check Extension public release gate
        run: npm run check:extension-release-gate

      - name: Build macOS packages
        run: npm run dist:mac

      - name: Smoke packaged Extension Node runtime (macOS x64)
        run: npm run smoke:packaged-extensions -- --resources dist/mac/Kun.app/Contents/Resources

      - name: Smoke packaged Extension Node runtime (macOS arm64)
        run: npm run smoke:packaged-extensions -- --resources dist/mac-arm64/Kun.app/Contents/Resources

      - name: Smoke host-native FFmpeg broker (fail closed)
        env:
          KUN_RUN_MEDIA_SMOKE: '1'
        run: npm run smoke:extension-native-media

      - name: Smoke packaged Kun Video Editor native workflow
        run: npm run smoke:packaged-video-editor-native

      - name: Smoke packaged Extension desktop Chromium (host-native macOS)
        run: npm run smoke:packaged-extension-desktop

      - name: Record commit-bound macOS artifact evidence
        env:
          KUN_EVIDENCE_COMMIT: ${{ needs.prepare.outputs.head_sha }}
        run: npm run evidence:extension-native

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-dev-mac
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Kun-*-mac-*.dmg
            dist/Kun-*-mac-*.zip
            dist/Kun-*-mac-*.blockmap
            dist/latest-mac.yml
            dist/extension-native-evidence-darwin.json

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 90
    needs: prepare
    env:
      KUN_APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      KUN_ARTIFACT_VERSION: ${{ needs.prepare.outputs.dev_version }}
      KUN_UPDATE_CHANNEL: frontier
      DEEPSEEK_GUI_APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      DEEPSEEK_GUI_ARTIFACT_VERSION: ${{ needs.prepare.outputs.dev_version }}
      DEEPSEEK_GUI_UPDATE_CHANNEL: frontier
      RELEASE_CHANNEL: frontier
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Check out develop commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install host-native FFmpeg
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg.exe -ErrorAction SilentlyContinue) -or -not (Get-Command ffprobe.exe -ErrorAction SilentlyContinue)) {
            choco install ffmpeg --yes --no-progress
          }
          $ffmpegPath = (Get-Command ffmpeg.exe).Source
          if ((& $ffmpegPath -hide_banner -filters 2>&1 | Out-String) -notmatch '\sdrawtext\s') {
            throw 'Installed FFmpeg does not provide the required drawtext filter.'
          }
          "KUN_FFMPEG_PATH=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "KUN_FFPROBE_PATH=$((Get-Command ffprobe.exe).Source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci

      - name: Check Extension public release gate
        run: npm run check:extension-release-gate

      - name: Build Windows installer
        run: npm run dist:win

      - name: Smoke packaged Extension Node runtime
        run: npm run smoke:packaged-extensions -- --resources dist/win-unpacked/resources

      - name: Smoke host-native FFmpeg broker (fail closed)
        env:
          KUN_RUN_MEDIA_SMOKE: '1'
        run: npm run smoke:extension-native-media

      - name: Smoke packaged Kun Video Editor native workflow
        run: npm run smoke:packaged-video-editor-native

      - name: Smoke packaged Extension desktop Chromium
        run: npm run smoke:packaged-extension-desktop

      - name: Record commit-bound Windows artifact evidence
        env:
          KUN_EVIDENCE_COMMIT: ${{ needs.prepare.outputs.head_sha }}
        run: npm run evidence:extension-native

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-dev-win
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Kun-*-win-x64.exe
            dist/Kun-*-win-x64.exe.blockmap
            dist/latest.yml
            dist/extension-native-evidence-win32.json

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: prepare
    env:
      KUN_APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      KUN_ARTIFACT_VERSION: ${{ needs.prepare.outputs.dev_version }}
      KUN_UPDATE_CHANNEL: frontier
      DEEPSEEK_GUI_APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      DEEPSEEK_GUI_ARTIFACT_VERSION: ${{ needs.prepare.outputs.dev_version }}
      DEEPSEEK_GUI_UPDATE_CHANNEL: frontier
      RELEASE_CHANNEL: frontier
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Check out develop commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm build-essential python3 xvfb xauth util-linux ffmpeg
          ffmpeg -hide_banner -filters 2>&1 | grep -Eq '[[:space:]]drawtext[[:space:]]'

      - name: Install dependencies
        run: npm ci

      - name: Check Extension public release gate
        run: npm run check:extension-release-gate

      - name: Build Linux AppImage
        run: npm run dist:linux

      - name: Smoke packaged Extension Node runtime
        run: npm run smoke:packaged-extensions -- --resources dist/linux-unpacked/resources

      - name: Smoke host-native FFmpeg broker (fail closed)
        env:
          KUN_RUN_MEDIA_SMOKE: '1'
        run: npm run smoke:extension-native-media

      - name: Build deterministic Kun Video Editor extension package
        run: npm run pack:kun-video-editor

      - name: Smoke packaged Kun Video Editor native workflow
        run: >
          npm run smoke:packaged-video-editor-native --
          --archive dist/kun-video-editor-0.4.4.kunx

      - name: Prepare and verify Linux user namespace sandbox
        run: |
          if [[ -e /proc/sys/kernel/unprivileged_userns_clone ]]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          if [[ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          unshare --user --map-root-user /bin/true

      - name: Smoke packaged Extension desktop Chromium
        run: npm run smoke:packaged-extension-desktop

      - name: Smoke final Linux AppImage desktop Chromium
        timeout-minutes: 10
        run: npm run smoke:packaged-extension-appimage

      - name: Record commit-bound Linux artifact evidence
        env:
          KUN_EVIDENCE_COMMIT: ${{ needs.prepare.outputs.head_sha }}
        run: npm run evidence:extension-native

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-dev-linux
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Kun-*-linux-x86_64.AppImage
            dist/Kun-*-linux-x86_64.AppImage.blockmap
            dist/latest-linux.yml
            dist/extension-native-evidence-linux.json
            dist/kun-video-editor-*.kunx

  publish:
    name: Publish prerelease
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
      - build-linux
    env:
      GH_TOKEN: ${{ github.token }}
      DEV_VERSION: ${{ needs.prepare.outputs.dev_version }}
      HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
      RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
      TAG_NAME: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Check out develop commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.HEAD_SHA }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download daily dev artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: daily-dev-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify daily dev artifacts
        run: |
          set -euo pipefail
          required=(
            "Kun-${DEV_VERSION}-mac-arm64.dmg"
            "Kun-${DEV_VERSION}-mac-x64.dmg"
            "Kun-${DEV_VERSION}-mac-arm64.zip"
            "Kun-${DEV_VERSION}-mac-x64.zip"
            "Kun-${DEV_VERSION}-win-x64.exe"
            "Kun-${DEV_VERSION}-linux-x86_64.AppImage"
            "extension-native-evidence-darwin.json"
            "extension-native-evidence-win32.json"
            "extension-native-evidence-linux.json"
            "kun-video-editor-0.4.4.kunx"
          )

          for file in "${required[@]}"; do
            if [[ ! -f "release-artifacts/${file}" ]]; then
              echo "::error::Missing release artifact ${file}"
              find release-artifacts -maxdepth 2 -type f -print | sort
              exit 1
            fi
          done

          find release-artifacts -maxdepth 2 -type f -print | sort

      - name: Generate prerelease notes
        run: |
          set -euo pipefail
          short_sha="${HEAD_SHA::7}"
          cat > release-notes.md <<EOF
          Daily dev prerelease built from develop.

          ### Build information

          - Dev version: \`${DEV_VERSION}\`
          - App version: \`0.0.0-dev-${DEV_VERSION//./-}\`
          - Branch: \`develop\`
          - Commit: \`${short_sha}\`
          - Platforms: macOS arm64/x64, Windows x64, Linux x64
          EOF

      - name: Ensure prerelease tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" > /dev/null; then
            tag_sha="$(git rev-list -n 1 "${TAG_NAME}")"
            if [[ "${tag_sha}" != "${HEAD_SHA}" ]]; then
              echo "::error::Tag ${TAG_NAME} points at ${tag_sha}, expected ${HEAD_SHA}"
              exit 1
            fi
            echo "Reusing existing tag ${TAG_NAME}"
          else
            git tag -a "${TAG_NAME}" -m "${RELEASE_NAME}" "${HEAD_SHA}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Verify three-platform native evidence bundle
        run: >
          npm run verify:extension-native-evidence --
          --directory release-artifacts
          --commit "${HEAD_SHA}"
          --tag "${TAG_NAME}"
          --version "${DEV_VERSION}"

      - name: Verify downloadable Kun Video Editor extension package
        run: npm run verify:kun-video-editor-package -- --input release-artifacts

      - name: Create or update GitHub prerelease
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "${TAG_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --verify-tag \
              --prerelease \
              --latest=false
          fi

      - name: Upload GitHub prerelease assets
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(
            find release-artifacts -type f \
              \( -name 'Kun-*' -o -name 'latest*.yml' -o -name 'extension-native-evidence-*.json' -o -name 'kun-video-editor-*.kunx' \) \
              -print0
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No release assets found"
            exit 1
          fi

          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
