name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  RELEASE_CHANNEL: stable

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref == 'develop' &&
      github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      existing_tag: ${{ steps.version.outputs.existing_tag }}
    steps:
      - name: Check out merge commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute release version
        id: version
        run: node ./scripts/compute-ci-release-version.cjs

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 90
    needs: prepare
    env:
      KUN_APP_VERSION: ${{ needs.prepare.outputs.version }}
      KUN_UPDATE_CHANNEL: stable
      DEEPSEEK_GUI_APP_VERSION: ${{ needs.prepare.outputs.version }}
      DEEPSEEK_GUI_UPDATE_CHANNEL: stable
      RELEASE_CHANNEL: stable
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      CSC_FOR_PULL_REQUEST: 'true'
    steps:
      - name: Check out merge commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install host-native FFmpeg
        run: |
          brew install ffmpeg-full
          ffmpeg_bin="$(brew --prefix ffmpeg-full)/bin"
          "$ffmpeg_bin/ffmpeg" -hide_banner -filters 2>&1 | grep -Eq '[[:space:]]drawtext[[:space:]]'
          echo "$ffmpeg_bin" >> "$GITHUB_PATH"
          echo "KUN_FFMPEG_PATH=$ffmpeg_bin/ffmpeg" >> "$GITHUB_ENV"
          echo "KUN_FFPROBE_PATH=$ffmpeg_bin/ffprobe" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Check Extension public release gate
        run: npm run check:extension-release-gate

      - name: Decode Apple signing credentials
        env:
          MAC_CODESIGN_P12_BASE64: ${{ secrets.MAC_CODESIGN_P12_BASE64 }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          for name in MAC_CODESIGN_P12_BASE64 CSC_KEY_PASSWORD APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret or environment value: ${name}"
              exit 1
            fi
          done

          cert_path="${RUNNER_TEMP}/developer-id.p12"
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          export CERT_PATH="${cert_path}"
          export KEY_PATH="${key_path}"

          node <<'NODE'
          const fs = require('node:fs')
          fs.writeFileSync(process.env.CERT_PATH, Buffer.from(process.env.MAC_CODESIGN_P12_BASE64, 'base64'))
          fs.writeFileSync(process.env.KEY_PATH, Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))
          NODE

          {
            echo "CSC_LINK=${cert_path}"
            echo "APPLE_API_KEY=${key_path}"
            echo "MAC_SIGN=1"
          } >> "${GITHUB_ENV}"

      - name: Verify Apple signing credentials
        run: >
          npm run verify:apple -- --p12 "${CSC_LINK}"
          --p12-password "${CSC_KEY_PASSWORD}"
          --p8 "${APPLE_API_KEY}"
          --key-id "${APPLE_API_KEY_ID}"
          --issuer "${APPLE_API_ISSUER}"
          --check-notary

      - name: Build signed macOS packages
        run: npm run dist:mac:signed

      - name: Smoke packaged Extension Node runtime (macOS x64)
        run: npm run smoke:packaged-extensions -- --resources dist/mac/Kun.app/Contents/Resources

      - name: Smoke packaged Extension Node runtime (macOS arm64)
        run: npm run smoke:packaged-extensions -- --resources dist/mac-arm64/Kun.app/Contents/Resources

      - name: Smoke host-native FFmpeg broker (fail closed)
        env:
          KUN_RUN_MEDIA_SMOKE: '1'
        run: npm run smoke:extension-native-media

      - name: Smoke packaged Kun Video Editor native workflow
        run: npm run smoke:packaged-video-editor-native

      - name: Smoke packaged Extension desktop Chromium (host-native macOS)
        run: npm run smoke:packaged-extension-desktop

      - name: Record commit-bound macOS artifact evidence
        env:
          KUN_EVIDENCE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: npm run evidence:extension-native

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Kun-*-mac-*.dmg
            dist/Kun-*-mac-*.zip
            dist/Kun-*-mac-*.blockmap
            dist/latest-mac.yml
            dist/extension-native-evidence-darwin.json

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 90
    needs: prepare
    env:
      KUN_APP_VERSION: ${{ needs.prepare.outputs.version }}
      KUN_UPDATE_CHANNEL: stable
      DEEPSEEK_GUI_APP_VERSION: ${{ needs.prepare.outputs.version }}
      DEEPSEEK_GUI_UPDATE_CHANNEL: stable
      RELEASE_CHANNEL: stable
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Check out merge commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install host-native FFmpeg
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg.exe -ErrorAction SilentlyContinue) -or -not (Get-Command ffprobe.exe -ErrorAction SilentlyContinue)) {
            choco install ffmpeg --yes --no-progress
          }
          $ffmpegPath = (Get-Command ffmpeg.exe).Source
          if ((& $ffmpegPath -hide_banner -filters 2>&1 | Out-String) -notmatch '\sdrawtext\s') {
            throw 'Installed FFmpeg does not provide the required drawtext filter.'
          }
          "KUN_FFMPEG_PATH=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "KUN_FFPROBE_PATH=$((Get-Command ffprobe.exe).Source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci

      - name: Check Extension public release gate
        run: npm run check:extension-release-gate

      - name: Build Windows installer
        run: npm run dist:win

      - name: Smoke packaged Extension Node runtime
        run: npm run smoke:packaged-extensions -- --resources dist/win-unpacked/resources

      - name: Smoke host-native FFmpeg broker (fail closed)
        env:
          KUN_RUN_MEDIA_SMOKE: '1'
        run: npm run smoke:extension-native-media

      - name: Smoke packaged Kun Video Editor native workflow
        run: npm run smoke:packaged-video-editor-native

      - name: Smoke packaged Extension desktop Chromium
        run: npm run smoke:packaged-extension-desktop

      - name: Record commit-bound Windows artifact evidence
        env:
          KUN_EVIDENCE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: npm run evidence:extension-native

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Kun-*-win-x64.exe
            dist/Kun-*-win-x64.exe.blockmap
            dist/latest.yml
            dist/extension-native-evidence-win32.json

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: prepare
    env:
      KUN_APP_VERSION: ${{ needs.prepare.outputs.version }}
      KUN_UPDATE_CHANNEL: stable
      DEEPSEEK_GUI_APP_VERSION: ${{ needs.prepare.outputs.version }}
      DEEPSEEK_GUI_UPDATE_CHANNEL: stable
      RELEASE_CHANNEL: stable
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Check out merge commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          # build-essential + python3: node-pty ships no Linux prebuild, so it
          # must be compiled from source against Electron's ABI during dist.
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm build-essential python3 xvfb xauth util-linux ffmpeg
          ffmpeg -hide_banner -filters 2>&1 | grep -Eq '[[:space:]]drawtext[[:space:]]'

      - name: Install dependencies
        run: npm ci

      - name: Check Extension public release gate
        run: npm run check:extension-release-gate

      - name: Build Linux AppImage
        run: npm run dist:linux

      - name: Smoke packaged Extension Node runtime
        run: npm run smoke:packaged-extensions -- --resources dist/linux-unpacked/resources

      - name: Smoke host-native FFmpeg broker (fail closed)
        env:
          KUN_RUN_MEDIA_SMOKE: '1'
        run: npm run smoke:extension-native-media

      - name: Build deterministic Kun Video Editor extension package
        run: npm run pack:kun-video-editor

      - name: Smoke packaged Kun Video Editor native workflow
        run: >
          npm run smoke:packaged-video-editor-native --
          --archive dist/kun-video-editor-0.4.4.kunx

      - name: Prepare and verify Linux user namespace sandbox
        run: |
          if [[ -e /proc/sys/kernel/unprivileged_userns_clone ]]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          if [[ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          unshare --user --map-root-user /bin/true

      - name: Smoke packaged Extension desktop Chromium
        run: npm run smoke:packaged-extension-desktop

      - name: Smoke final Linux AppImage desktop Chromium
        timeout-minutes: 10
        run: npm run smoke:packaged-extension-appimage

      - name: Record commit-bound Linux artifact evidence
        env:
          KUN_EVIDENCE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: npm run evidence:extension-native

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/Kun-*-linux-x86_64.AppImage
            dist/Kun-*-linux-x86_64.AppImage.blockmap
            dist/latest-linux.yml
            dist/extension-native-evidence-linux.json
            dist/kun-video-editor-*.kunx

  publish:
    name: Publish GitHub Release and R2
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-windows
      - build-linux
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
      PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
      RELEASE_CHANNEL: stable
      KUN_UPDATE_CHANNEL: stable
      DEEPSEEK_GUI_UPDATE_CHANNEL: stable
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
      R2_RELEASE_PREFIX: ${{ secrets.R2_RELEASE_PREFIX }}
    steps:
      - name: Check out merge commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          required=(
            "Kun-*-mac-arm64.dmg"
            "Kun-*-mac-x64.dmg"
            "Kun-*-mac-arm64.zip"
            "Kun-*-mac-x64.zip"
            "Kun-*-win-x64.exe"
            "Kun-*-linux-x86_64.AppImage"
            "latest-mac.yml"
            "latest.yml"
            "latest-linux.yml"
            "extension-native-evidence-darwin.json"
            "extension-native-evidence-win32.json"
            "extension-native-evidence-linux.json"
            "kun-video-editor-0.4.4.kunx"
          )

          for pattern in "${required[@]}"; do
            if ! compgen -G "release-artifacts/${pattern}" > /dev/null; then
              echo "::error::Missing release artifact matching ${pattern}"
              find release-artifacts -maxdepth 2 -type f -print | sort
              exit 1
            fi
          done

          find release-artifacts -maxdepth 2 -type f -print | sort

      - name: Generate release notes
        run: |
          set -euo pipefail
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            node ./scripts/generate-release-notes.cjs "${PREVIOUS_TAG}" > release-notes.md
          else
            node ./scripts/generate-release-notes.cjs > release-notes.md
          fi

          {
            echo
            echo "---"
            echo
            echo "### 构建信息"
            echo
            echo "- Release version: \`${RELEASE_VERSION}\`"
            echo "- Release channel: \`${RELEASE_CHANNEL}\`"
            echo "- Branch: \`master\`"
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- macOS: Developer ID signed and notarized"
            echo "- Platforms: macOS arm64/x64, Windows x64, Linux x64"
          } >> release-notes.md

      - name: Ensure release tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          head_sha="$(git rev-parse HEAD)"
          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" > /dev/null; then
            tag_sha="$(git rev-list -n 1 "${TAG_NAME}")"
            if [[ "${tag_sha}" != "${head_sha}" ]]; then
              echo "::error::Tag ${TAG_NAME} points at ${tag_sha}, expected ${head_sha}"
              exit 1
            fi
            echo "Reusing existing tag ${TAG_NAME}"
          else
            git tag -a "${TAG_NAME}" -m "${RELEASE_NAME}" "${head_sha}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Verify three-platform native evidence bundle
        run: >
          npm run verify:extension-native-evidence --
          --directory release-artifacts
          --commit "$(git rev-parse HEAD)"
          --tag "${TAG_NAME}"
          --version "${RELEASE_VERSION}"

      - name: Verify downloadable Kun Video Editor extension package
        run: npm run verify:kun-video-editor-package -- --input release-artifacts

      - name: Create or update draft GitHub Release
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${TAG_NAME}" \
              --draft \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --verify-tag
          fi

      - name: Upload GitHub Release assets
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(
            find release-artifacts -type f \
              \( -name 'Kun-*' -o -name 'latest*.yml' -o -name 'extension-native-evidence-*.json' -o -name 'kun-video-editor-*.kunx' \) \
              -print0
          )

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "::error::No release assets found"
            exit 1
          fi

          gh release upload "${TAG_NAME}" "${assets[@]}" --clobber

      - name: Upload release archive to R2
        run: |
          set -euo pipefail
          node ./scripts/publish-r2.mjs upload --platform mac --dist release-artifacts --tag "${TAG_NAME}" --channel "${RELEASE_CHANNEL}"
          node ./scripts/publish-r2.mjs upload --platform win --dist release-artifacts --tag "${TAG_NAME}" --channel "${RELEASE_CHANNEL}"
          node ./scripts/publish-r2.mjs upload --platform linux --dist release-artifacts --tag "${TAG_NAME}" --channel "${RELEASE_CHANNEL}"

      - name: Promote R2 latest
        run: >
          node ./scripts/publish-r2.mjs promote
          --tag "${TAG_NAME}"
          --channel "${RELEASE_CHANNEL}"
          --platforms mac,win,linux

      - name: Publish GitHub Release
        run: gh release edit "${TAG_NAME}" --draft=false --prerelease=false --latest
